<body class="min-h-screen bg-orange-50 text-stone-800">

<div id="toast" class="fixed top-4 right-1/2 translate-x-1/2 z-50 bg-orange-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm hidden"></div>

<div id="confirmModalOverlay" class="fixed inset-0 bg-black/40 z-40 hidden items-center justify-center p-4">
  <div class="bg-white rounded-xl p-5 max-w-sm w-full border-2 border-orange-300">
    <h3 class="brand-title font-bold text-xl text-orange-900 mb-2">✓ התור שלך נקבע!</h3>
    <p id="confirmModalDetails" class="text-stone-700 mb-4"></p>
    <div class="space-y-2">
      <a id="confirmModalGoogleBtn" target="_blank" rel="noopener" class="block text-center w-full bg-orange-800 text-white rounded-lg py-2 font-medium hover:bg-orange-900 transition">📅 הוספה ליומן Google</a>
      <button id="confirmModalIcsBtn" class="w-full bg-orange-100 text-orange-900 rounded-lg py-2 font-medium hover:bg-orange-200 transition">⬇️ הורדת קובץ ליומן (iPhone / Outlook)</button>
      <button id="confirmModalCloseBtn" class="w-full bg-stone-200 text-stone-700 rounded-lg py-2 font-medium hover:bg-stone-300 transition">סגירה</button>
    </div>
  </div>
</div>

<header class="border-b-2 border-orange-300 bg-orange-100 sticky top-0 z-10">
  <div class="max-w-md mx-auto px-4 py-3 flex items-center">
    <div class="flex items-center gap-3">
      <img id="brandIcon" alt="רמה" class="w-20 h-20 rounded-full object-cover border-2 border-orange-300 shrink-0 cursor-pointer" />
      <div>
        <h1 class="brand-title font-bold text-2xl text-orange-900 leading-tight">תוֹרָמָה</h1>
        <p class="brand-subtitle text-xl text-orange-700/80 leading-tight">תור לתספורת אצל רמה</p>
      </div>
    </div>
  </div>
</header>

<main class="max-w-md mx-auto px-4 py-6" id="app">
  <p class="text-center text-stone-400 text-sm">טוען...</p>
</main>

<script src="firebase-config.js"></script>
